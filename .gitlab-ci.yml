stages:
  - test
  - build
  - deploy

variables:
  GO_VERSION: "1.26.2"
  NODE_VERSION: "20"
  DOCKER_VERSION: "27.4.1"
  HARBOR_REGISTRY: "harbor.inspur.local"
  HARBOR_PROJECT: "atf"
  BACKEND_IMAGE_REPO: "harbor.inspur.local/atf/auto-test-flow-backend"
  FRONTEND_IMAGE_REPO: "harbor.inspur.local/atf/auto-test-flow-frontend"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  GOPROXY: "https://mirrors.aliyun.com/goproxy,direct"
  GOSUMDB: "sum.golang.google.cn"
  NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
  ALPINE_MIRROR: "https://mirrors.aliyun.com"
  DEPLOY_HOST: "192.168.53.185"
  DEPLOY_PORT: "22"
  DEPLOY_USER: "ubuntu"
  DEPLOY_BASE_DIR: "/opt/AutoTestFlow"

cache:
  paths:
    - frontend/node_modules/
    - backend/.cache/go-build/
    - backend/pkg/mod/

backend-test:
  tags:
    - docker
  stage: test
  image: harbor.inspur.local/atf/golang:${GO_VERSION}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  variables:
    GOCACHE: "$CI_PROJECT_DIR/backend/.cache/go-build"
    GOMODCACHE: "$CI_PROJECT_DIR/backend/pkg/mod"
  before_script:
    - go env -w GOPROXY="$GOPROXY"
    - go env -w GOSUMDB="$GOSUMDB"
  script:
    - cd backend
    - go test ./cmd/... ./internal/...

frontend-test:
  tags:
    - docker
  stage: test
  image: harbor.inspur.local/atf/node:${NODE_VERSION}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY" --legacy-peer-deps
  script:
    - cd frontend
    - npm ci
    - npm run build

build-backend-image:
  tags:
    - docker
  stage: build
  image: harbor.inspur.local/atf/docker:${DOCKER_VERSION}-cli
  services:
    - name: harbor.inspur.local/atf/docker:${DOCKER_VERSION}-dind
  needs:
    - backend-test
  variables:
    DOCKER_BUILDKIT: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - sed -i "s|https\?://dl-cdn.alpinelinux.org/alpine|${ALPINE_MIRROR}/alpine|g" /etc/apk/repositories
    - docker info
    - |
      docker login "$HARBOR_REGISTRY" \
      -u "$DOCKER_USERNAME" \
      -p "$DOCKER_PASSWORD"
    - docker pull harbor.inspur.local/atf/golang:1.26.2
    - docker pull harbor.inspur.local/atf/alpine:3.20
  script:
    - export BACKEND_IMAGE="${BACKEND_IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
    - echo "BACKEND_IMAGE=${BACKEND_IMAGE}"
    - docker build -t "$BACKEND_IMAGE" backend
    - docker push "$BACKEND_IMAGE"

build-frontend-image:
  tags:
    - docker
  stage: build
  image: harbor.inspur.local/atf/docker:${DOCKER_VERSION}-cli
  services:
    - name: harbor.inspur.local/atf/docker:${DOCKER_VERSION}-dind
  needs:
    - frontend-test
  variables:
    DOCKER_BUILDKIT: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - sed -i "s|https\?://dl-cdn.alpinelinux.org/alpine|${ALPINE_MIRROR}/alpine|g" /etc/apk/repositories
    - docker info
    - |
      docker login "$HARBOR_REGISTRY" \
      -u "$DOCKER_USERNAME" \
      -p "$DOCKER_PASSWORD"
    - docker pull harbor.inspur.local/atf/node:20-alpine
    - docker pull harbor.inspur.local/atf/nginx:1.27-alpine
  script:
    - export FRONTEND_IMAGE="${FRONTEND_IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
    - echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}"
    - docker build -t "$FRONTEND_IMAGE" frontend
    - docker push "$FRONTEND_IMAGE"

deploy-production:
  tags:
    - docker
  stage: deploy
  image: harbor.inspur.local/atf/alpine-base:3.20-cn-node
  needs:
    - build-backend-image
    - build-frontend-image
  environment:
    name: production
    url: http://192.168.53.185
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - test -n "$DEPLOY_SSH_PRIVATE_KEY" || { echo "DEPLOY_SSH_PRIVATE_KEY is required"; exit 1; }
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key.pem
    - chmod 600 ~/.ssh/deploy_key.pem
    - |
      if [ -n "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
        printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" > ~/.ssh/known_hosts
      fi
    - chmod 600 ~/.ssh/known_hosts
  script:
    - export APP_DIR="${DEPLOY_BASE_DIR}/app"
    - export BACKEND_IMAGE_VALUE="${BACKEND_IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
    - export FRONTEND_IMAGE_VALUE="${FRONTEND_IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
    - echo "DEPLOY_BASE_DIR=${DEPLOY_BASE_DIR}"
    - echo "APP_DIR=${APP_DIR}"
    - echo "BACKEND_IMAGE=${BACKEND_IMAGE_VALUE}"
    - echo "FRONTEND_IMAGE=${FRONTEND_IMAGE_VALUE}"
    - export MYSQL_PASSWORD_VALUE="${MYSQL_ROOT_PASSWORD:-root}"
    - export MYSQL_DATABASE_VALUE="${MYSQL_DATABASE:-auto_test_flow}"
    - export MYSQL_IMAGE_VALUE="${MYSQL_IMAGE:-mysql:8.0}"
    - export FRONTEND_PORT_VALUE="${FRONTEND_PORT:-80}"
    - export BACKEND_PORT_VALUE="${BACKEND_PORT:-8080}"
    - export MYSQL_PORT_VALUE="${MYSQL_PORT:-3306}"
    - export JWT_SECRET_VALUE="${ATF_JWT_SECRET:-change-me-jwt-secret-in-production}"
    - mkdir -p .deploy
    - |
      cat > .deploy/.env.deploy <<EOF
      MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD_VALUE}
      MYSQL_DATABASE=${MYSQL_DATABASE_VALUE}
      MYSQL_IMAGE=${MYSQL_IMAGE_VALUE}
      BACKEND_IMAGE=${BACKEND_IMAGE_VALUE}
      FRONTEND_IMAGE=${FRONTEND_IMAGE_VALUE}
      FRONTEND_PORT=${FRONTEND_PORT_VALUE}
      BACKEND_PORT=${BACKEND_PORT_VALUE}
      MYSQL_PORT=${MYSQL_PORT_VALUE}
      ATF_MYSQL_DATA_DIR=${DEPLOY_BASE_DIR}/mysql
      ATF_GIT_WORK_DIR=${DEPLOY_BASE_DIR}/workspace/repos
      ATF_CLI_WORKSPACE_DIR=${DEPLOY_BASE_DIR}/workspace/cli-runtime
      ATF_LOG_DIR=${DEPLOY_BASE_DIR}/logs
      ATF_JWT_SECRET=${JWT_SECRET_VALUE}
      ATF_ZENTAO_BASE_URL=${ATF_ZENTAO_BASE_URL}
      ATF_ZENTAO_API_TOKEN=${ATF_ZENTAO_API_TOKEN}
      ATF_MAIL_HOST=${ATF_MAIL_HOST:-smtp.example.com}
      ATF_MAIL_PORT=${ATF_MAIL_PORT:-465}
      ATF_MAIL_USERNAME=${ATF_MAIL_USERNAME}
      ATF_MAIL_PASSWORD=${ATF_MAIL_PASSWORD}
      ATF_MAIL_FROM=${ATF_MAIL_FROM:-autotest@example.com}
      EOF
    - ssh -i ~/.ssh/deploy_key.pem -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "sudo -n mkdir -p '$APP_DIR' '${DEPLOY_BASE_DIR}/mysql' '${DEPLOY_BASE_DIR}/workspace/repos' '${DEPLOY_BASE_DIR}/workspace/cli-runtime' '${DEPLOY_BASE_DIR}/logs'"
    - rsync -az --delete --rsync-path="sudo -n rsync" -e "ssh -i ~/.ssh/deploy_key.pem -p $DEPLOY_PORT" --exclude '.git/' --exclude '.deploy/' --exclude 'frontend/node_modules/' --exclude 'backend/bin/' --exclude 'logs/' ./ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/"
    - rsync -az --rsync-path="sudo -n rsync" -e "ssh -i ~/.ssh/deploy_key.pem -p $DEPLOY_PORT" .deploy/.env.deploy "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/.env.deploy"
    - |
      ssh -i ~/.ssh/deploy_key.pem -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "set -eu
        cd '$APP_DIR'

        if command -v docker >/dev/null 2>&1 && sudo -n docker version >/dev/null 2>&1; then
          printf '%s\n' '$DOCKER_PASSWORD' | sudo -n docker login '$HARBOR_REGISTRY' --username '$DOCKER_USERNAME' --password-stdin
        else
          echo 'Unable to access docker on target host via passwordless sudo. Ensure the deploy user can run sudo -n docker.' >&2
          exit 1
        fi

        COMPOSE_LEGACY='0'
        if sudo -n docker compose version >/dev/null 2>&1; then
          COMPOSE_CMD='sudo -n docker compose'
        elif command -v docker-compose >/dev/null 2>&1 && sudo -n docker-compose version >/dev/null 2>&1; then
          COMPOSE_CMD='sudo -n docker-compose'
          COMPOSE_LEGACY='1'
        else
          echo 'Unable to access docker compose on target host. Ensure the deploy user can run sudo -n docker compose or sudo -n docker-compose.' >&2
          exit 1
        fi

        \${COMPOSE_CMD} -p auto-test-flow --env-file .env.deploy -f docker-compose.prod.yml pull

        if [ "\${COMPOSE_LEGACY}" = '1' ]; then
          sudo -n docker rm -f atf-frontend atf-backend >/dev/null 2>&1 || true
          sudo -n docker rm -f 5b0a28087046_atf-backend >/dev/null 2>&1 || true
        fi

        if ! \${COMPOSE_CMD} -p auto-test-flow --env-file .env.deploy -f docker-compose.prod.yml up -d --remove-orphans; then
          \${COMPOSE_CMD} -p auto-test-flow --env-file .env.deploy -f docker-compose.prod.yml ps || true
          \${COMPOSE_CMD} -p auto-test-flow --env-file .env.deploy -f docker-compose.prod.yml logs --tail=200 mysql || true
          \${COMPOSE_CMD} -p auto-test-flow --env-file .env.deploy -f docker-compose.prod.yml logs --tail=200 backend || true
          \${COMPOSE_CMD} -p auto-test-flow --env-file .env.deploy -f docker-compose.prod.yml logs --tail=200 frontend || true
          exit 1
        fi"
