stages:
  - test
  - build
  - deploy

variables:
  GO_VERSION: "1.25.0"
  NODE_VERSION: "20"
  DOCKER_VERSION: "27.4.1"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  GOPROXY: "https://goproxy.cn,direct"
  GOSUMDB: "sum.golang.google.cn"
  NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
  ALPINE_MIRROR: "https://mirrors.aliyun.com"
  DEPLOY_HOST: "192.168.53.106"
  DEPLOY_PORT: "22"
  DEPLOY_USER: "root"
  DEPLOY_BASE_DIR: "/data/AutoTestFlow"

cache:
  paths:
    - frontend/node_modules/
    - backend/.cache/go-build/
    - backend/pkg/mod/

backend-test:
  stage: test
  image: golang:${GO_VERSION}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  variables:
    GOCACHE: "$CI_PROJECT_DIR/backend/.cache/go-build"
    GOMODCACHE: "$CI_PROJECT_DIR/backend/pkg/mod"
  before_script:
    - go env -w GOPROXY="$GOPROXY"
    - go env -w GOSUMDB="$GOSUMDB"
  script:
    - cd backend
    - go test ./...

frontend-check:
  stage: test
  image: node:${NODE_VERSION}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
  script:
    - cd frontend
    - npm ci
    - npm run build

build-backend-image:
  stage: build
  image: docker:${DOCKER_VERSION}-cli
  services:
    - name: docker:${DOCKER_VERSION}-dind
  needs:
    - backend-test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - sed -i "s|https\?://dl-cdn.alpinelinux.org/alpine|${ALPINE_MIRROR}/alpine|g" /etc/apk/repositories
    - docker info
  script:
    - docker build --pull -t auto-test-flow/backend:${CI_COMMIT_SHORT_SHA} backend

build-frontend-image:
  stage: build
  image: docker:${DOCKER_VERSION}-cli
  services:
    - name: docker:${DOCKER_VERSION}-dind
  needs:
    - frontend-check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - sed -i "s|https\?://dl-cdn.alpinelinux.org/alpine|${ALPINE_MIRROR}/alpine|g" /etc/apk/repositories
    - docker info
  script:
    - docker build --pull -t auto-test-flow/frontend:${CI_COMMIT_SHORT_SHA} frontend

deploy-production:
  stage: deploy
  image: alpine:3.20
  needs:
    - build-backend-image
    - build-frontend-image
  environment:
    name: production
    url: http://192.168.53.106
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - sed -i "s|https\?://dl-cdn.alpinelinux.org/alpine|${ALPINE_MIRROR}/alpine|g" /etc/apk/repositories
    - apk update
    - apk add --no-cache openssh-client rsync sshpass
    - test -n "$DEPLOY_PASSWORD"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -n "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
        printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" > ~/.ssh/known_hosts
      fi
    - chmod 600 ~/.ssh/known_hosts
  script:
    - export APP_DIR="${DEPLOY_BASE_DIR}/app"
    - export MYSQL_PASSWORD_VALUE="${MYSQL_ROOT_PASSWORD:-root}"
    - export MYSQL_DATABASE_VALUE="${MYSQL_DATABASE:-auto_test_flow}"
    - export FRONTEND_PORT_VALUE="${FRONTEND_PORT:-80}"
    - export BACKEND_PORT_VALUE="${BACKEND_PORT:-8080}"
    - export MYSQL_PORT_VALUE="${MYSQL_PORT:-3306}"
    - export JWT_SECRET_VALUE="${ATF_JWT_SECRET:-change-me-jwt-secret-in-production}"
    - mkdir -p .deploy
    - |
      cat > .deploy/.env.deploy <<EOF
      MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD_VALUE}
      MYSQL_DATABASE=${MYSQL_DATABASE_VALUE}
      FRONTEND_PORT=${FRONTEND_PORT_VALUE}
      BACKEND_PORT=${BACKEND_PORT_VALUE}
      MYSQL_PORT=${MYSQL_PORT_VALUE}
      ATF_MYSQL_DATA_DIR=${DEPLOY_BASE_DIR}/mysql
      ATF_GIT_WORK_DIR=${DEPLOY_BASE_DIR}/workspace/repos
      ATF_CLI_WORKSPACE_DIR=${DEPLOY_BASE_DIR}/workspace/cli-runtime
      ATF_LOG_DIR=${DEPLOY_BASE_DIR}/logs
      ATF_JWT_SECRET=${JWT_SECRET_VALUE}
      ATF_ZENTAO_BASE_URL=${ATF_ZENTAO_BASE_URL}
      ATF_ZENTAO_API_TOKEN=${ATF_ZENTAO_API_TOKEN}
      ATF_MAIL_HOST=${ATF_MAIL_HOST:-smtp.example.com}
      ATF_MAIL_PORT=${ATF_MAIL_PORT:-465}
      ATF_MAIL_USERNAME=${ATF_MAIL_USERNAME}
      ATF_MAIL_PASSWORD=${ATF_MAIL_PASSWORD}
      ATF_MAIL_FROM=${ATF_MAIL_FROM:-autotest@example.com}
      EOF
    - export SSHPASS="$DEPLOY_PASSWORD"
    - sshpass -e ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$APP_DIR' '${DEPLOY_BASE_DIR}/mysql' '${DEPLOY_BASE_DIR}/workspace/repos' '${DEPLOY_BASE_DIR}/workspace/cli-runtime' '${DEPLOY_BASE_DIR}/logs'"
    - sshpass -e rsync -az --delete --exclude '.git/' --exclude '.deploy/' --exclude 'frontend/node_modules/' --exclude 'backend/bin/' --exclude 'logs/' ./ "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/"
    - sshpass -e rsync -az .deploy/.env.deploy "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/.env.deploy"
    - sshpass -e ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cd '$APP_DIR' && docker compose --env-file .env.deploy -f docker-compose.prod.yml up -d --build --remove-orphans"
