version: "3.8"

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: atf-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-auto_test_flow}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${ATF_MYSQL_DATA_DIR:-/data2/AutoTestFlow/mysql}:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: atf-backend
    shm_size: '2g'
    tmpfs:
      - /tmp:rw,size=2g
      - /dev/shm:rw,size=2g
    environment:
      TZ: Asia/Shanghai
      ATF_DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      ATF_DATABASE_DBNAME: ${MYSQL_DATABASE:-auto_test_flow}
      ATF_GIT_WORK_DIR: /tmp/auto-test-flow/repos
      ATF_CLI_RUNTIME_WORKSPACE_ROOT: /tmp/auto-test-flow/cli-runtime
      ATF_JWT_SECRET: ${ATF_JWT_SECRET:-change-me-jwt-secret-in-production}
      ATF_ZENTAO_BASE_URL: ${ATF_ZENTAO_BASE_URL:-}
      ATF_ZENTAO_API_TOKEN: ${ATF_ZENTAO_API_TOKEN:-}
      ATF_MAIL_HOST: ${ATF_MAIL_HOST:-smtp.example.com}
      ATF_MAIL_PORT: ${ATF_MAIL_PORT:-465}
      ATF_MAIL_USERNAME: ${ATF_MAIL_USERNAME:-}
      ATF_MAIL_PASSWORD: ${ATF_MAIL_PASSWORD:-}
      ATF_MAIL_FROM: ${ATF_MAIL_FROM:-autotest@example.com}
      CHROME_ARGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu --disable-software-rasterizer --disable-background-networking --disable-default-apps --disable-extensions --disable-sync --disable-translate --metrics-recording-only --no-first-run --safebrowsing-disable-auto-update --disable-features=site-per-process --disable-background-timer-throttling --disable-backgrounding-occluded-windows --disable-renderer-backgrounding
      CHROME_USER_DATA_DIR: /tmp/auto-test-flow/chrome-profile
      CHROME_DISABLE_GPU: "true"
      CHROME_NO_SANDBOX: "true"
      CHROME_REMOTE_DEBUGGING_PORT: "9222"
      CHROME_PATH: /usr/local/bin/chrome
      CHROME_DEVTOOLS_MCP_USER_DATA_DIR: /tmp/auto-test-flow/chrome-profile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "9222:9222"
    volumes:
      - ./backend/configs/config.docker.yaml:/app/configs/config.yaml:ro
      - ${ATF_RUNTIME_HOST_DIR:-/data2/auto-test-flow}:/tmp/auto-test-flow
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting Chrome MCP health check..."
        if command -v chrome-mcp-health-check >/dev/null 2>&1; then
          chrome-mcp-health-check.sh || echo "Chrome MCP health check failed, but continuing..."
        else
          echo "Chrome MCP health check script not found, skipping..."
        fi
        echo "Starting backend server..."
        ./server -config configs/config.yaml

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: atf-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
