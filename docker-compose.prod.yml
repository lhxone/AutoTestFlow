version: "3.8"

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: atf-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-auto_test_flow}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${ATF_MYSQL_DATA_DIR:-/data1/AutoTestFlow/mysql}:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atf-backend
    environment:
      TZ: Asia/Shanghai
      ATF_DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      ATF_DATABASE_DBNAME: ${MYSQL_DATABASE:-auto_test_flow}
      ATF_GIT_WORK_DIR: ${ATF_GIT_WORK_DIR:-/data1/AutoTestFlow/workspace/repos}
      ATF_CLI_RUNTIME_WORKSPACE_ROOT: ${ATF_CLI_WORKSPACE_DIR:-/data1/AutoTestFlow/workspace/cli-runtime}
      ATF_JWT_SECRET: ${ATF_JWT_SECRET:-change-me-jwt-secret-in-production}
      ATF_ZENTAO_BASE_URL: ${ATF_ZENTAO_BASE_URL:-}
      ATF_ZENTAO_API_TOKEN: ${ATF_ZENTAO_API_TOKEN:-}
      ATF_MAIL_HOST: ${ATF_MAIL_HOST:-smtp.example.com}
      ATF_MAIL_PORT: ${ATF_MAIL_PORT:-465}
      ATF_MAIL_USERNAME: ${ATF_MAIL_USERNAME:-}
      ATF_MAIL_PASSWORD: ${ATF_MAIL_PASSWORD:-}
      ATF_MAIL_FROM: ${ATF_MAIL_FROM:-autotest@example.com}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend/configs/config.docker.yaml:/app/configs/config.yaml:ro
      - ${ATF_GIT_WORK_DIR:-/data1/AutoTestFlow/workspace/repos}:${ATF_GIT_WORK_DIR:-/data1/AutoTestFlow/workspace/repos}
      - ${ATF_CLI_WORKSPACE_DIR:-/data1/AutoTestFlow/workspace/cli-runtime}:${ATF_CLI_WORKSPACE_DIR:-/data1/AutoTestFlow/workspace/cli-runtime}
      - ${ATF_LOG_DIR:-/data1/AutoTestFlow/logs}:${ATF_LOG_DIR:-/data1/AutoTestFlow/logs}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atf-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
