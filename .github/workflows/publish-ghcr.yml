name: Build and Publish to GHCR

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.26.2"
  NODE_VERSION: "20"
  BACKEND_IMAGE_NAME: auto-test-flow-backend
  BACKEND_RUNTIME_IMAGE_NAME: auto-test-flow-backend-runtime
  FRONTEND_IMAGE_NAME: auto-test-flow-frontend

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Configure Go proxy
        run: |
          go env -w GOPROXY="https://goproxy.cn|https://proxy.golang.org|https://mirrors.aliyun.com/goproxy|direct"
          go env -w GOSUMDB="sum.golang.google.cn"

      - name: Run backend tests
        working-directory: backend
        run: go test ./cmd/... ./internal/...

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure npm mirror
        run: |
          npm config set registry "https://registry.npmmirror.com"
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --include=dev --no-audit --fund=false
          test -x node_modules/.bin/vue-tsc
          test -x node_modules/.bin/vite
          npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build-backend-image:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image repo
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_REPO=ghcr.io/${OWNER_LOWER}/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "RUNTIME_IMAGE_REPO=ghcr.io/${OWNER_LOWER}/${{ env.BACKEND_RUNTIME_IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "RUNTIME_IMAGE_TAG=runtime-${{ hashFiles('backend/Dockerfile.runtime-base', 'backend/scripts/chrome-mcp-health-check.sh') }}" >> "$GITHUB_ENV"
          echo "RUNTIME_IMAGE=ghcr.io/${OWNER_LOWER}/${{ env.BACKEND_RUNTIME_IMAGE_NAME }}:runtime-${{ hashFiles('backend/Dockerfile.runtime-base', 'backend/scripts/chrome-mcp-health-check.sh') }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check backend runtime image
        id: runtime_check
        run: |
          if docker buildx imagetools inspect "${RUNTIME_IMAGE}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and (optionally) push backend runtime image
        if: steps.runtime_check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.runtime-base
          load: ${{ github.event_name != 'push' }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.RUNTIME_IMAGE }}
          build-args: |
            BASE_IMAGE=node:${{ env.NODE_VERSION }}

      - name: Build and (optionally) push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: ${{ github.event_name != 'push' }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          build-args: |
            GO_IMAGE=golang:${{ env.GO_VERSION }}
            RUNTIME_IMAGE=${{ env.RUNTIME_IMAGE }}
            GOPROXY=https://goproxy.cn|https://proxy.golang.org|https://mirrors.aliyun.com/goproxy|direct
            GOSUMDB=sum.golang.google.cn

  build-frontend-image:
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set image repo
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_REPO=ghcr.io/${OWNER_LOWER}/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.ci
          load: ${{ github.event_name != 'push' }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          build-args: |
            NGINX_IMAGE=nginx:1.27-alpine
